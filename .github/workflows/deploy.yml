name: Build and Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Build and Push to GHCR
        run: |
          ./mvnw compile jib:build -DskipTests \
            -Djib.to.image=ghcr.io/${{ github.actor }}/ci-cd_hw_backend:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Build and Push to GHCR
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.actor }}/ci-cd_hw_backend:latest" | tr '[:upper:]' '[:lower:]')
          ./mvnw compile jib:build -DskipTests \
            -Djib.to.image=$IMAGE_NAME \
            -Djib.to.auth.username=${{ github.actor }} 
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}